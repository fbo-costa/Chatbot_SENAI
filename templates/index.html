<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Social Chat</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1639322537228-f710d846310a") center/cover;
    color: white;
}

body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(2,6,23,0.85);
    backdrop-filter: blur(6px);
}

header {
    position:relative;
    z-index:2;
    padding:20px 40px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size:24px;
    color:#22d3ee;
    text-shadow:0 0 20px #22d3ee;
}

.container {
    position:relative;
    z-index:2;
    padding:30px;
}

.menu {
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.menu button {
    padding:10px 20px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    background:transparent;
    color:white;
}

.menu .active {
    background:linear-gradient(45deg,#22d3ee,#9333ea);
    box-shadow:0 0 15px #22d3ee;
}

.chat-box {
    max-width:1100px;
    margin:auto;
    border-radius:20px;
    padding:25px;
    backdrop-filter: blur(20px);
    background: rgba(2,6,23,0.6);
    border:1px solid rgba(34,211,238,0.2);
    box-shadow:0 0 40px rgba(34,211,238,0.2);
}

.chat {
    height:400px;
    overflow-y:auto;
}

.msg {display:flex;margin:15px 0;}

.bot .avatar {
    width:45px;height:45px;border-radius:50%;
    background:linear-gradient(45deg,#22d3ee,#9333ea);
    margin-right:10px;
    box-shadow:0 0 15px #22d3ee;
}

.bot .bubble {
    background:#020617;
    border:1px solid #22d3ee;
    box-shadow:0 0 20px rgba(34,211,238,0.7);
    padding:12px;
    border-radius:15px;
    max-width:60%;
}

.user {justify-content:flex-end;}

.user .bubble {
    background:linear-gradient(45deg,#9333ea,#06b6d4);
    padding:12px;
    border-radius:20px;
}

.footer {
    margin-top:15px;
    display:flex;
    gap:10px;
}

input {
    flex:1;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#020617;
    color:white;
}

button.send {
    padding:12px 25px;
    border-radius:12px;
    border:none;
    background:linear-gradient(45deg,#22d3ee,#9333ea);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">⚡ SOCIAL CHAT</div>
</header>

<div class="container">

    <div class="menu">
        <button>📷 Fotos</button>
        <button>🎬 Reels</button>
        <button class="active">💬 Bate-papo</button>
    </div>

    <div class="chat-box">

        <div id="chat" class="chat"></div>

        <div class="footer">
            <input id="msg" placeholder="Escreva sua mensagem...">
            <button class="send" onclick="enviar()">Enviar</button>
        </div>

    </div>

</div>

<script>
// 🔊 VOZ NATURAL
let voces = [];
speechSynthesis.onvoiceschanged = () => {
    voces = speechSynthesis.getVoices();
};

function falar(texto) {
    const speech = new SpeechSynthesisUtterance(texto);

    const voz = voces.find(v => v.lang === "pt-BR") || voces[0];

    speech.voice = voz;
    speech.rate = 0.95 + Math.random() * 0.2;
    speech.pitch = 1 + Math.random() * 0.2;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
}

// ✍️ DIGITAÇÃO
function digitarTexto(texto) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `
        <div class="avatar"></div>
        <div class="bubble"></div>
    `;

    chat.appendChild(div);

    const bubble = div.querySelector(".bubble");

    let i = 0;

    function escrever() {
        if (i < texto.length) {
            bubble.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escrever, 15);
        } else {
            falar(texto);
        }
    }

    escrever();
}

function addUser(texto) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg user";
    div.innerHTML = `<div class="bubble">${texto}</div>`;

    chat.appendChild(div);
}

// 🚀 ENVIO
async function enviar() {
    const input = document.getElementById("msg");
    const texto = input.value;

    if (!texto) return;

    addUser(texto);
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: texto})
    });

    const data = await res.json();

    digitarTexto(data.reply);
}

// 🔥 LIBERA AUDIO
document.body.addEventListener("click", () => {
    speechSynthesis.resume();
});
</script>

</body>
</html>
